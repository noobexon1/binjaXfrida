name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute next version
        id: version
        run: |
          LATEST_TAG=$(git tag --list 'v*' --sort=-v:refname | head -n1)

          if [ -z "$LATEST_TAG" ]; then
            MAJOR=0; MINOR=0; PATCH=0
          else
            IFS='.' read -r MAJOR MINOR PATCH <<< "${LATEST_TAG#v}"
          fi

          BUMP="${{ inputs.bump }}"
          if [ "$BUMP" = "major" ]; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          elif [ "$BUMP" = "minor" ]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "### Next version: v${NEW_VERSION} (${BUMP} bump)" >> "$GITHUB_STEP_SUMMARY"

      - name: Update plugin.json version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          jq --arg v "$VERSION" '.version = $v' plugin.json > plugin.json.tmp
          mv plugin.json.tmp plugin.json

      - name: Commit version bump
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add plugin.json
          git commit -m "release: ${TAG}"
          git tag "$TAG"
          git push origin HEAD "$TAG"

      - name: Build release artifact
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p binjaXfrida
          cp -r __init__.py log.py plugin.json LICENSE core actions ui templates binjaXfrida/
          find binjaXfrida -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true
          zip -r "binjaXfrida_${VERSION}.zip" binjaXfrida

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gh release create "${{ steps.version.outputs.tag }}" \
            "binjaXfrida_${VERSION}.zip" \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes
